name: CI/Publish — MailHog-GM

# Compila o fork MailHog-GM, roda os testes de integração (envio + leitura de
# e-mail) e publica a imagem no GHCR (ghcr.io/<owner>/mailhog-gm).
# O DEPLOY no Swarm é feito pelo repositório TokenGuard
# (.github/workflows/cd-email.yml lá), que consome esta imagem e tem os secrets
# de infra — evitando compartilhar secrets entre repositórios.

on:
  push:
    branches: [main, master]
    paths:
      - 'main.go'
      - 'Dockerfile'
      - 'vendor/**'
      - 'Deploy/stack/e-mail.yaml'
      - 'test/**'
      - '.github/workflows/cd-email.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mailhog-gm

jobs:
  # ============================================================
  # Testes de integração (gate): sobe MailHog-GM + testes C#
  # ============================================================
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build + run integration tests (docker compose)
        shell: bash
        run: |
          set -e
          docker compose up --build --abort-on-container-exit --exit-code-from tests

      - name: Tear down
        if: always()
        shell: bash
        run: docker compose down -v || true

  # ============================================================
  # Build + push da imagem para o GHCR
  # ============================================================
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        shell: bash
        env:
          DOCKER_BUILDKIT: 1
        run: |
          IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="${{ env.REGISTRY }}/${IMAGE_NAME}:${{ steps.version.outputs.version }}"
          DEV_TAG="${{ env.REGISTRY }}/${IMAGE_NAME}:dev"
          LATEST_TAG="${{ env.REGISTRY }}/${IMAGE_NAME}:latest"

          MAX_RETRIES=3; RETRY_COUNT=0
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            echo "Build attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            if docker build \
              -t "$SHA_TAG" -t "$DEV_TAG" -t "$LATEST_TAG" \
              --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              --label "org.opencontainers.image.revision=${{ github.sha }}" \
              . ; then echo "Build succeeded!"; break; fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            [ $RETRY_COUNT -lt $MAX_RETRIES ] && { sleep 10; docker builder prune -f || true; }
          done
          [ $RETRY_COUNT -ge $MAX_RETRIES ] && { echo "Build failed after $MAX_RETRIES attempts"; exit 1; } || true

          RETRY_COUNT=0
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            echo "Push attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.repository_owner }} --password-stdin
            if docker push "$SHA_TAG" && docker push "$DEV_TAG" && docker push "$LATEST_TAG"; then echo "Push succeeded!"; break; fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            [ $RETRY_COUNT -lt $MAX_RETRIES ] && sleep 5
          done
          [ $RETRY_COUNT -ge $MAX_RETRIES ] && { echo "Push failed after $MAX_RETRIES attempts"; exit 1; } || true
